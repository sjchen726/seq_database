{% extends 'base.html' %}
{% block page_title %} — 编辑人员信息{% endblock %}
{% block topbar_content %}
  <span class="ds-topbar-title">编辑人员信息</span>
  <span class="ds-topbar-spacer"></span>
  <a href="{% url 'author_list' %}" class="ds-btn ds-btn-ghost">返回列表</a>
{% endblock %}
{% block content %}
<div class="ds-form-page">
  <div class="ds-form-card">
    <div class="ds-form-card-title">编辑 — {{ user.username }}</div>
    <form method="POST" action="{% url 'edit_author' %}?id={{ user.id }}">
      {% csrf_token %}
      <div class="ds-form-row">
        <label class="ds-form-label" for="edit_username">姓名</label>
        <input class="ds-form-control" id="edit_username" placeholder="姓名" name="edit_username" value="{{ user.username }}">
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="edit_email">邮箱</label>
        <input class="ds-form-control" id="edit_email" placeholder="邮箱" name="edit_email" value="{{ user.email }}">
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="edit_user_type">角色分类</label>
        <select class="ds-form-control" id="edit_user_type" name="edit_user_type">
          <option value="superadmin" {% if user.user_type == "superadmin" %}selected{% endif %}>超级管理员</option>
          <option value="admin" {% if user.user_type == "admin" %}selected{% endif %}>管理员</option>
          <option value="data_admin" {% if user.user_type == "data_admin" %}selected{% endif %}>数据库管理员</option>
          <option value="project" {% if user.user_type == "project" %}selected{% endif %}>项目管理</option>
          <option value="delivery" {% if user.user_type == "delivery" %}selected{% endif %}>递送</option>
          <option value="modify" {% if user.user_type == "modify" %}selected{% endif %}>修饰</option>
          <option value="guest" {% if user.user_type == "guest" %}selected{% endif %}>访客</option>
        </select>
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="edit_permissions_project">项目权限</label>
        <input class="ds-form-control" id="edit_permissions_project" name="edit_permissions_project"
               type="text" placeholder="负责项目 (格式: BPR-3M01,BPR-3M02)" value="{{ user.permissions_project }}">
        <p style="font-size:12px;color:#64748b;margin:4px 0 0 0;">多个项目用逗号分隔。</p>
      </div>
      <div style="margin-top:24px;display:flex;justify-content:flex-end;gap:10px;">
        <a href="{% url 'author_list' %}" class="ds-btn ds-btn-ghost">返回</a>
        <button type="submit" class="ds-btn ds-btn-primary">保存</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
