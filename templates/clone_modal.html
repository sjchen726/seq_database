<!-- Reusable clone modal include -->
<div class="modal fade" id="cloneModal" tabindex="-1" role="dialog" aria-labelledby="cloneModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header p-2" style="background:#f8fafc;border-bottom:1px solid #e8edf4;">
        <div class="search-header d-flex align-items-center w-100" id="cloneDragHandle" style="justify-content: space-between;">
          <span style="font-weight:700; font-size:1.1rem; font-family:'DM Sans',sans-serif; color:#0f172a;">&#129516; 克隆序列 - Strand ID: <span id="cloneStrandId"></span></span>
          <button type="button" class="ds-close-btn" data-bs-dismiss="modal" aria-label="Close">✖</button>
        </div>
      </div>
      <div class="modal-body">
        <form id="cloneForm">
          <input type="hidden" name="strand_id" id="modal_strand_id" />
          <div id="cloneRowsContainer"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="ds-btn ds-btn-ghost" data-bs-dismiss="modal">取消</button>
        <button type="button" class="ds-btn ds-btn-primary" id="confirmCloneBtn">克隆序列</button>
      </div>
    </div>
  </div>
</div>
