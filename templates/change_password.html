<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>SeqDB — 修改密码</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="/static/css/design-system.css" rel="stylesheet">
</head>
<body class="ds-standalone-body">
<div class="ds-standalone-card">
  <div class="ds-standalone-logo">
    <div class="ds-logo-mark">S</div>
    <div>
      <div class="ds-logo-text">SeqDB</div>
      <div class="ds-logo-tagline">Sequence Database</div>
    </div>
  </div>
  <div class="ds-standalone-title">修改密码</div>
  <div class="ds-standalone-sub">请输入原密码及新密码</div>

  {% if messages %}
  <div class="ds-alert-list">
    {% for message in messages %}
    <div class="ds-alert {% if 'error' in message.tags %}ds-alert-error{% elif 'success' in message.tags %}ds-alert-success{% else %}ds-alert-info{% endif %}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% if error %}
  <div style="padding:10px 14px;border-radius:6px;margin-bottom:16px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-size:13.5px;">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/change_password/">
    {% csrf_token %}
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="old_password">原密码</label>
      <input type="password" class="ds-form-control" id="old_password" name="old_password" placeholder="请输入原密码" required style="width:100%;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="new_password1">新密码</label>
      <input type="password" class="ds-form-control" id="new_password1" name="new_password1" placeholder="请输入新密码" required style="width:100%;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="new_password2">确认新密码</label>
      <input type="password" class="ds-form-control" id="new_password2" name="new_password2" placeholder="再次输入新密码" required style="width:100%;box-sizing:border-box;">
    </div>
    <div style="display:flex;gap:10px;">
      <a href="/seq_list/" class="ds-btn ds-btn-ghost" style="flex:1;justify-content:center;">返回首页</a>
      <button type="submit" class="ds-btn ds-btn-primary" style="flex:1;justify-content:center;">确认修改</button>
    </div>
  </form>
</div>
</body>
</html>
