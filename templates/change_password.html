<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>修改密码 - 序列管理系统</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://code.jquery.com/ui/1.10.3/themes/redmond/jquery-ui.css" rel="stylesheet" media="screen">
	<link href="/static/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link href="/static/css/styles.css" rel="stylesheet">
	<!--[if lt IE 9]>
	<script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
	<script src="https://oss.maxcdn.com/libs/respond.js/1.3.0/respond.min.js"></script>
	<![endif]-->
</head>
<body class="login-bg">
	<div class="header">
	     <div class="container">
	        <div class="row">
	           <div class="col-md-12">
	              <div class="logo">
	                 <h1><a href="/seq_list">序列管理系统</a></h1>
	              </div>
	           </div>
	        </div>
	     </div>
	</div>

	<div class="page-content container">
		<div class="row">
			<div class="col-md-4 col-md-offset-4">
				<div class="login-wrapper">
			        <div class="box">
							<h6>修改密码</h6>
							<form class="content-wrap" role="form" action="/change_password/" method="post">
								{% csrf_token %}
								<input class="form-control" name="old_password" type="password" placeholder="原密码" required>
								<input class="form-control" name="new_password1" type="password" placeholder="新密码" required>
								<input class="form-control" name="new_password2" type="password" placeholder="确认新密码" required>
								<div class="action text-center" style="margin-top: 20px;">
									<button type="submit" class="btn btn-primary" style="margin-right: 10px;">确认修改</button>
									<a href="/login/" class="btn btn-outline-primary" style="min-width: 100px;">返回登录</a>
								</div>
							</form>
			        </div>
			        {% if error %}
						<p class="text-danger" style="padding:10px;">{{ error }}</p>
			        {% endif %}
			    </div>
			</div>
		</div>
	</div>

	<script src="https://code.jquery.com/jquery.js"></script>
	<script src="/static/bootstrap/js/bootstrap.min.js"></script>
	<script src="/static/js/custom.js"></script>
</body>
</html>
