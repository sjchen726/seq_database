<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>修改密码 - 序列管理系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="/static/css/styles.css" rel="stylesheet">
  <style>
    body { background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .pwd-card {
      width: 420px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,.10);
      padding: 36px 40px;
    }
    .pwd-card h4 { font-weight: 700; color: #1a3a5c; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="pwd-card">
    <h4 class="text-center"><i class="bi bi-shield-lock me-2"></i>修改密码</h4>

    <!-- Django messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="/change_password/">
      {% csrf_token %}
      <div class="mb-3">
        <label for="old_password" class="form-label">原密码</label>
        <input type="password" class="form-control" id="old_password" name="old_password" placeholder="请输入原密码" required>
      </div>
      <div class="mb-3">
        <label for="new_password1" class="form-label">新密码</label>
        <input type="password" class="form-control" id="new_password1" name="new_password1" placeholder="请输入新密码" required>
      </div>
      <div class="mb-4">
        <label for="new_password2" class="form-label">确认新密码</label>
        <input type="password" class="form-control" id="new_password2" name="new_password2" placeholder="再次输入新密码" required>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary flex-fill" style="background:#1a6496;border-color:#1a6496;">确认修改</button>
        <a href="/seq_list/" class="btn btn-outline-secondary flex-fill">返回首页</a>
      </div>
    </form>
  </div>

  <!-- Toast 容器 -->
  <div id="msg-toast-container" style="position:fixed;top:20px;right:20px;z-index:9999;"></div>

  <script src="https://code.jquery.com/jquery.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/custom.js"></script>
  <script>
  {% if messages %}
    {% for message in messages %}
    (function() {
      var level = '{{ message.tags }}';
      if (typeof showToast === 'function') { showToast('{{ message|escapejs }}', level); }
    })();
    {% endfor %}
  {% endif %}
  </script>
</body>
</html>
