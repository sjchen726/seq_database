{% extends 'base.html' %}
{% block page_title %} — 编辑注册序列{% endblock %}
{% block topbar_content %}
  <span class="ds-topbar-title">编辑注册序列</span>
  <span class="ds-topbar-spacer"></span>
  <a href="{% url 'reg_seq_list' %}" class="ds-btn ds-btn-ghost">返回列表</a>
{% endblock %}
{% block content %}
<div class="ds-form-page">
  <div class="ds-form-card">
    <div class="ds-form-card-title">编辑序列信息 — {{ seq.rm_code }}</div>
    <form method="POST" action="{% url 'edit_reg_seq' %}?id={{ seq.rm_code }}">
      <input type="hidden" name="edit_id" value="{{ seq.rm_code }}">
      {% csrf_token %}
      <div class="ds-form-row">
        <label class="ds-form-label">Sequence（序列，不可修改）</label>
        <div class="ds-readonly-value" style="font-family:monospace;">{{ seq.seq }}</div>
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="edit_position">Position</label>
        <input class="ds-form-control" id="edit_position" placeholder="Position" name="edit_position" value="{{ seqinfo.Pos }}">
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="edit_Transcript">Transcript</label>
        <input class="ds-form-control" id="edit_Transcript" placeholder="Transcript" name="edit_Transcript" value="{{ seqinfo.Transcript }}">
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="edit_Remark">Remarks</label>
        <input class="ds-form-control" id="edit_Remark" placeholder="Remarks" name="edit_Remark" value="{{ seqinfo.Remark }}">
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="edit_date">更新时间</label>
        <input class="ds-form-control" id="edit_date" placeholder="更新时间" name="edit_date" type="datetime-local">
      </div>
      <script>
        const now = new Date();
        const pad = n => String(n).padStart(2,'0');
        document.getElementById('edit_date').value =
          `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
      </script>
      <div style="margin-top:24px;display:flex;justify-content:flex-end;gap:10px;">
        <a href="{% url 'reg_seq_list' %}" class="ds-btn ds-btn-ghost">返回</a>
        <button type="submit" class="ds-btn ds-btn-primary"
          onclick="return confirm('此操作将修改当前数据，您确定要更新吗？');">更新</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
