<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>SeqDB — 注册账户</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="/static/css/design-system.css" rel="stylesheet">
</head>
<body class="ds-standalone-body">
<div class="ds-standalone-card" style="max-width:460px;">
  <div class="ds-standalone-logo">
    <div class="ds-logo-mark">S</div>
    <div>
      <div class="ds-logo-text">SeqDB</div>
      <div class="ds-logo-tagline">Sequence Database</div>
    </div>
  </div>
  <div class="ds-standalone-title">注册账户</div>
  <div class="ds-standalone-sub">RNA 序列管理系统 · 核酸药物研发数据平台</div>

  {% if messages %}
  <div class="ds-alert-list">
    {% for message in messages %}
    <div class="ds-alert {% if 'error' in message.tags %}ds-alert-error{% elif 'success' in message.tags %}ds-alert-success{% else %}ds-alert-info{% endif %}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <form method="post" action="/register/">
    {% csrf_token %}
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="reg_username">用户名</label>
      <input type="text" class="ds-form-control" id="reg_username" name="username" placeholder="用户名" required style="width:100%;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="reg_email">邮箱</label>
      <input type="email" class="ds-form-control" id="reg_email" name="email" placeholder="邮箱地址" style="width:100%;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="reg_password">密码</label>
      <input type="password" class="ds-form-control" id="reg_password" name="password" placeholder="密码" required style="width:100%;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="user_type">用户类型</label>
      <select class="ds-form-control" id="user_type" name="user_type" style="width:100%;box-sizing:border-box;">
        <option value="" disabled selected>请选择用户类型</option>
        <option value="project">项目管理</option>
        <option value="delivery">递送</option>
        <option value="modify">修饰</option>
      </select>
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="permissions_project">负责项目</label>
      <input type="text" class="ds-form-control" id="permissions_project" name="permissions_project"
             placeholder="格式: BPR-3M01,BPR-3M02" style="width:100%;box-sizing:border-box;">
      <p style="font-size:12px;color:#94a3b8;margin:4px 0 0 0;">多个项目用逗号分隔</p>
    </div>
    <button type="submit" class="ds-btn ds-btn-primary" style="width:100%;justify-content:center;">注册</button>
  </form>
  <div style="text-align:center;margin-top:16px;font-size:13px;color:#64748b;">
    已有账户？<a href="/login" style="color:#2563eb;text-decoration:none;font-weight:500;">登录</a>
  </div>
</div>
</body>
</html>
