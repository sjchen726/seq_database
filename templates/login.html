<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>SeqDB — 登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="/static/css/design-system.css" rel="stylesheet">
</head>
<body class="ds-standalone-body">
<div class="ds-standalone-card">
  <div class="ds-standalone-logo">
    <div class="ds-logo-mark">S</div>
    <div>
      <div class="ds-logo-text">SeqDB</div>
      <div class="ds-logo-tagline">Sequence Database</div>
    </div>
  </div>
  <div class="ds-standalone-title">登录</div>
  <div class="ds-standalone-sub">RNA 序列管理系统 · 核酸药物研发数据平台</div>

  {% if messages %}
  <div style="margin-bottom:16px;">
    {% for message in messages %}
    <div style="padding:10px 14px;border-radius:6px;margin-bottom:8px;font-size:13.5px;
      {% if 'error' in message.tags %}background:#fef2f2;border:1px solid #fecaca;color:#991b1b;
      {% elif 'success' in message.tags %}background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;
      {% else %}background:#f0f9ff;border:1px solid #bae6fd;color:#0c4a6e;{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <form method="post" action="/login/">
    {% csrf_token %}
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="username">
        <i class="bi bi-person"></i> 用户名
      </label>
      <input type="text" class="ds-form-control" id="username" name="username" placeholder="请输入用户名" required style="width:100%;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;" for="password">
        <i class="bi bi-lock"></i> 密码
      </label>
      <input type="password" class="ds-form-control" id="password" name="password" placeholder="请输入密码" required style="width:100%;box-sizing:border-box;">
    </div>
    <button type="submit" class="ds-btn ds-btn-primary" style="width:100%;justify-content:center;">登录</button>
  </form>
  <div style="text-align:center;margin-top:16px;font-size:13px;color:#64748b;">
    没有账户？<a href="/register" style="color:#2563eb;text-decoration:none;font-weight:500;">注册</a>
  </div>
</div>
</body>
</html>
