<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>RNA序列管理系统 — 登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="/static/css/styles.css" rel="stylesheet">
  <style>
    body { margin: 0; height: 100vh; display: flex; overflow: hidden; }
    .brand-side {
      width: 40%;
      background: linear-gradient(135deg, #1a3a5c 0%, #1a6496 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .brand-side .brand-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.9; }
    .brand-side h1 { font-size: 1.9rem; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.5px; }
    .brand-side p { opacity: 0.75; font-size: 0.95rem; text-align: center; line-height: 1.6; }
    .form-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
    }
    .login-card { width: 360px; }
    .login-card h4 { font-weight: 700; color: #1a3a5c; margin-bottom: 1.5rem; }
    .form-floating .form-control { border-radius: 6px; }
    @media (max-width: 640px) {
      .brand-side { display: none; }
      .form-side { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="brand-side">
    <div class="brand-icon"><i class="bi bi-activity"></i></div>
    <h1>SeqDB</h1>
    <p>RNA 序列管理系统<br>核酸药物研发数据平台</p>
  </div>
  <div class="form-side">
    <div class="login-card">
      <h4 class="text-center"><i class="bi bi-box-arrow-in-right me-2"></i>登录</h4>

      <!-- Django messages -->
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}

      <form method="post" action="/login/">
        {% csrf_token %}
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="username" name="username" placeholder="用户名" required>
          <label for="username"><i class="bi bi-person me-1"></i>用户名</label>
        </div>
        <div class="form-floating mb-4">
          <input type="password" class="form-control" id="password" name="password" placeholder="密码" required>
          <label for="password"><i class="bi bi-lock me-1"></i>密码</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2" style="background:#1a6496;border-color:#1a6496;font-size:1rem;">
          登录
        </button>
      </form>
      <div class="text-center mt-3" style="font-size:0.9rem; color:#666;">
        没有账户？<a href="/register" style="color:#1a6496;">注册</a>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div id="msg-toast-container" style="position:fixed;top:20px;right:20px;z-index:9999;"></div>

  <script src="https://code.jquery.com/jquery.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/custom.js"></script>
</body>
</html>
