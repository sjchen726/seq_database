{% extends 'base.html' %}
{% block page_title %} — 新增人员{% endblock %}
{% block topbar_content %}
  <span class="ds-topbar-title">新增人员</span>
  <span class="ds-topbar-spacer"></span>
  <a href="{% url 'author_list' %}" class="ds-btn ds-btn-ghost">返回列表</a>
{% endblock %}
{% block content %}
<div class="ds-form-page" style="padding-top:20px;">
  <div class="ds-form-card">
    <div class="ds-form-card-title">新增人员</div>
    <form method="POST" action="{% url 'add_author' %}">
      {% csrf_token %}
      <div class="ds-form-row">
        <label class="ds-form-label" for="username">姓名</label>
        <input class="ds-form-control" id="username" placeholder="姓名" name="username" required>
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="email">邮箱</label>
        <input class="ds-form-control" id="email" placeholder="邮箱" name="email" type="email">
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="user">角色分类</label>
        <select class="ds-form-control" id="user" name="user">
          <option value="" disabled selected>请选择</option>
          <option value="project">项目管理</option>
          <option value="delivery">递送</option>
          <option value="modify">修饰</option>
          <option value="guest">访客</option>
        </select>
      </div>
      <div class="ds-form-row">
        <label class="ds-form-label" for="edit_permissions_project">项目权限</label>
        <input class="ds-form-control" id="edit_permissions_project" name="edit_permissions_project"
               type="text" placeholder="负责项目 (格式: BPR-3M01,BPR-3M02)">
        <p style="font-size:12px;color:#64748b;margin:4px 0 0 0;">多个项目用逗号分隔。</p>
      </div>
      <div style="margin-top:24px;display:flex;justify-content:flex-end;gap:10px;">
        <a href="{% url 'author_list' %}" class="ds-btn ds-btn-ghost">返回</a>
        <button type="submit" class="ds-btn ds-btn-primary">保存</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
